name: Android CI & Release

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Extract Version Name
      id: get_version
      run: |
        VERSION_NAME=$(grep "versionName =" app/build.gradle.kts | awk -F'"' '{print $2}')
        echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT

    - name: Rename APK
      run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/stream-url-catcher-v${{ steps.get_version.outputs.VERSION_NAME }}.apk

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: stream-url-catcher-v${{ steps.get_version.outputs.VERSION_NAME }}
        path: app/build/outputs/apk/debug/stream-url-catcher-v${{ steps.get_version.outputs.VERSION_NAME }}.apk

    - name: Create GitHub Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/debug/stream-url-catcher-v${{ steps.get_version.outputs.VERSION_NAME }}.apk
        tag_name: v${{ steps.get_version.outputs.VERSION_NAME }}
        name: Release v${{ steps.get_version.outputs.VERSION_NAME }}
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
